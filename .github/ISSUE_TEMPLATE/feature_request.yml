name: Feature request
description: Suggest an improvement or new option for HitMarkers.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: Feature
      description: Describe the feature you want.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why would this help?
      description: Explain the use case or problem this solves.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Visual style
        - Compatibility
        - Configuration
        - Packaging / installation
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: Add mockups, examples, screenshots, or references if useful.
